<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dark Web Access</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body {
  background:black;
  overflow:hidden;
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.container {
  width:360px;
  background:rgba(0,0,0,0.9);
  border:2px solid red;
  border-radius:15px;
  padding:25px;
  text-align:center;
  box-shadow:0 0 25px red;
  position:relative;
  z-index:2;
}
.avatar {
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid red;
  box-shadow:0 0 20px red;
  margin-bottom:10px;
  /* صورة ثابتة، بدون دوران */
}
h1 { color:#ff0000; margin-bottom:20px; }
.passwordInput {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:2px solid red;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:18px;
  text-align:center;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:black;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}
.message {
  margin-top:10px;
  font-weight:bold;
  display:none;
}
.success { color:#00ff00; }
.error { color:#ff0000; }

/* خلفية الجماجم */
#skullCanvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}
</style>
</head>
<body>

<canvas id="skullCanvas"></canvas>

<div class="container">
  <!-- صورة البوت الجديدة ثابتة -->
  <img class="avatar" src="https://i.postimg.cc/Qd0ZNNVW/IMG-20260316-184547.png">
  
  <h1>تحذير هاذا Farm Chat GPT النسخه الشريره 👾 </h1>

  <!-- مربع الباسورد -->
  <input id="password" type="password" maxlength="5" placeholder="أدخل الباسورد (5 أرقام)" class="passwordInput">
  <button onclick="checkPassword()">تأكيد</button>

  <div class="message success" id="successMsg">جاري تحميل النظام </div>
  <div class="message error" id="errorMsg">الباسورد غلط! يمكنك التواصل مع المطور.</div>
</div>

<script>
// التحقق من الباسورد
function checkPassword() {
  const pwdInput = document.getElementById("password");
  const pwd = pwdInput.value.trim();
  pwdInput.value = ""; // مسح الباسورد فور الضغط

  if(pwd === "907010") {
    document.getElementById("successMsg").style.display = "block";
    document.getElementById("errorMsg").style.display = "none";
    setTimeout(()=> {
      window.location.href = "ai-chat.html"; // صفحة الشات
    }, 1500);
  } else {
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("successMsg").style.display = "none";
  }
}

// سقوط الجماجم المخيفة مع تأثير نار خفيف
const canvas = document.getElementById("skullCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const skullImg = new Image();
skullImg.src = "https://i.ibb.co/6wYkD9J/skull.png"; // استخدم صورة جماجم حقيقية مخيفة
const skulls = [];
const skullCount = 20;

for(let i=0;i<skullCount;i++){
  skulls.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    speed: 1 + Math.random()*3,
    size: 30 + Math.random()*30
  });
}

function drawSkulls(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  skulls.forEach(s=>{
    // تأثير توهج مخيف
    ctx.shadowColor = 'red';
    ctx.shadowBlur = 10;
    ctx.drawImage(skullImg, s.x, s.y, s.size, s.size);
    s.y += s.speed;
    if(s.y > canvas.height) s.y = -s.size;
  });
  requestAnimationFrame(drawSkulls);
}
skullImg.onload = ()=>{ drawSkulls(); }
</script>

</body>
</html>
