<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Form GPT النسخة الشريرة</title>
<style>
body {
  margin:0;
  padding:0;
  background:black;
  color:red;
  font-family:"Courier New", monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}
.container {
  z-index:2;
  text-align:center;
  position:relative;
}
.avatar {
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid red;
  box-shadow:0 0 20px red;
  margin-bottom:10px;
}
.passwordInput {
  width:300px;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:2px solid red;
  background:rgba(255,0,0,0.1);
  color:white;
  font-size:18px;
  text-align:center;
  outline:none;
}
button {
  width:100px;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:red;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
button:hover { background:black; color:red; border:1px solid red; }
.contactBtn {
  width:150px;
  padding:8px;
  margin-top:10px;
  background:#111;
  color:#00ff00;
  border:1px solid #00ff00;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}
.contactBtn:hover { background:#00ff00; color:black; }
.message { margin-top:10px; font-weight:bold; display:none; }
.success { color:#00ff00; }
.error { color:#ff0000; }
#footerMsg { color:#888; font-size:12px; margin-top:15px; animation:fadeMsg 3s infinite; }
@keyframes fadeMsg {0%,100%{opacity:0;}50%{opacity:1;}}
#codeArea { color:red; text-align:left; font-family:"Courier New", monospace; font-size:14px; white-space:pre; overflow:hidden; width:100%; height:200px; margin-top:20px;}
</style>
</head>
<body>

<div class="container">
  <img class="avatar" src="https://i.postimg.cc/Qd0ZNNVW/IMG-20260316-184547.png">
  <h1>⚠️ Form GPT النسخة الشريرة ⚠️</h1>
  <input id="password" type="password" maxlength="5" placeholder="أدخل الباسورد" class="passwordInput">
  <div>
    <button onclick="checkPassword()">موافق</button>
    <button class="contactBtn" onclick="window.open('https://vkbkjhhii.github.io/Mon7aref1KBot/', '_blank')">التواصل مع المطور</button>
  </div>
  <div class="message success" id="successMsg">✔ جاري التحميل...</div>
  <div class="message error" id="errorMsg">✖ الباسورد غلط! تواصل مع المطور.</div>
</div>

<div id="codeArea"></div>
<div id="footerMsg">تم التطوير بواسطة المنحرف</div>

<script>
// الباسورد والتحقق + الصوت الشرير
function checkPassword(){
  const pwdInput = document.getElementById("password");
  const pwd = pwdInput.value.trim();
  pwdInput.value = "";
  if(pwd === "708099"){
    showSuccess();
    playHackerVoice();
    setTimeout(()=>{ window.location.href="next-page.html"; },1500);
  } else {
    showError();
  }
}
function showSuccess(){ document.getElementById("successMsg").style.display="block"; document.getElementById("errorMsg").style.display="none"; }
function showError(){ document.getElementById("errorMsg").style.display="block"; document.getElementById("successMsg").style.display="none"; }

// الصوت الشرير
function playHackerVoice(){
  const msg = "أهلاً بك في فارم ChatGPT النسخة الشريرة";
  const utter = new SpeechSynthesisUtterance(msg);
  utter.voice = speechSynthesis.getVoices().find(v=>v.lang.startsWith("ar")) || null;
  utter.pitch = 0.4;
  utter.rate = 0.9;
  speechSynthesis.speak(utter);
}

// كود بايسون شرير يكتب تدريجي
const codeContent = `
import os
import sys
import time

def hack_system():
    print("Accessing mainframe...")
    time.sleep(0.5)
    print("Injecting virus...")
    time.sleep(0.5)
    print("Bypassing security...")
    time.sleep(0.5)
    print("System compromised!")

hack_system()
`;
const codeArea = document.getElementById("codeArea");
let index=0;
function typeCode(){
  if(index<codeContent.length){
    codeArea.textContent += codeContent[index];
    index++;
    setTimeout(typeCode,50);
  }
}
typeCode();

</script>

</body>
</html>
