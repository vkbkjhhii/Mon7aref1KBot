<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>DARK WEB TERMINAL</title>

<style>

body{
margin:0;
background:#000;
font-family:monospace;
color:#00ff9f;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:rgba(0,0,0,0.9);
border:2px solid #00ff9f;
box-shadow:0 0 40px #00ff9f;
padding:40px;
width:90%;
max-width:420px;
text-align:center;
}

h1{
font-size:28px;
color:#00ff9f;
text-shadow:0 0 20px #00ff9f;
height:40px;
}

.skull{
font-size:70px;
margin-bottom:10px;
position:relative;
}

.fire{
position:absolute;
top:18px;
left:30px;
font-size:15px;
}

.fire2{
position:absolute;
top:18px;
right:30px;
font-size:15px;
}

.info{
margin-bottom:20px;
color:#00ff9f;
font-size:14px;
}

input,textarea{

width:100%;
padding:12px;
margin:10px 0;
background:black;
border:1px solid #00ff9f;
color:#00ff9f;
font-size:15px;

}

button{

width:100%;
padding:12px;
background:#00ff9f;
border:none;
color:black;
font-size:18px;
cursor:pointer;

}

button:hover{

background:black;
color:#00ff9f;
border:1px solid #00ff9f;
box-shadow:0 0 20px #00ff9f;

}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div class="container">

<div class="skull">
☠
<div class="fire">🔥</div>
<div class="fire2">🔥</div>
</div>

<h1 id="title"></h1>

<div class="info">
يمكنك التواصل مع المبرمج محمد فرعون
</div>

<input id="name" placeholder="اكتب اسمك">

<textarea id="msg" rows="4" placeholder="اكتب رسالتك"></textarea>

<button onclick="send()">ارسال الرسالة</button>

</div>

<script>

let word="المنحرف"
let i=0

function type(){

if(i<word.length){
document.getElementById("title").innerHTML+=word.charAt(i)
i++
setTimeout(type,200)
}

}

type()

function send(){

let name=document.getElementById("name").value.trim()
let msg=document.getElementById("msg").value.trim()

if(name=="" || msg==""){
alert("يجب كتابة الاسم والرسالة")
return
}

let token="8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY"
let chat_id="7771042305"

let text="📩 رسالة جديدة\n\n👤 الاسم: "+name+"\n💬 الرسالة: "+msg

fetch("https://api.telegram.org/bot"+token+"/sendMessage",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chat_id,
text:text
})
})

alert("تم ارسال الرسالة")

}

</script>

</body>
</html>
