<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dark Web Contact</title>
<style>
body{
    margin:0;
    background:black;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas#matrix{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* BOX */
.box{
    width:380px;
    padding:30px;
    background:rgba(10,10,10,0.95);
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 35px #00ff9f;
    border:2px solid #0f0;
    position:relative;
}

/* JUMJUMA NARROW FIRE EYES */
.skull{
    position:relative;
    width:100px;
    height:100px;
    margin:0 auto 15px;
}
.skull .head{
    width:100px;
    height:100px;
    background:#111;
    border-radius:50%;
    position:absolute;
    top:0;
    left:0;
    box-shadow:0 0 25px #00ff9f inset,0 0 10px red;
}
.skull .eye{
    width:20px;
    height:20px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:35px;
    animation: fire 0.3s infinite alternate;
}
.skull .eye.left{ left:25px; }
.skull .eye.right{ right:25px; }
@keyframes fire{
    0%{ box-shadow:0 0 10px orange, 0 0 25px red; transform: translateY(0); }
    100%{ box-shadow:0 0 25px orange, 0 0 50px red; transform: translateY(-3px); }
}

/* INPUTS */
input,textarea{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#111;
    color:#00ff9f;
    outline:none;
    font-family:monospace;
}
textarea{ height:100px; }

/* BUTTON */
button{
    width:95%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ff9f;
    font-weight:bold;
    cursor:pointer;
}
button:hover{ background:#0f0; }

#ok{ margin-top:10px; color:#00ff9f; font-weight:bold; }

h3{ margin-bottom:15px; text-shadow:0 0 5px #0f0; }

</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="skull">
  <div class="head"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
</div>

<h3>تواصل مع المطور</h3>

<input id="name" placeholder="اكتب اسمك">
<textarea id="msg" placeholder="اكتب رسالتك"></textarea>
<button onclick="send()">إرسال</button>
<p id="ok"></p>

</div>

<script>
/* MATRIX BACKGROUND */
var c=document.getElementById("matrix");
var ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;
var letters="01アカサタナハマヤラワ0123456789";
letters=letters.split("");
var font_size=14;
var columns=c.width/font_size;
var drops=[];
for(var x=0;x<columns;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0f0";
ctx.font=font_size+"px monospace";
for(var i=0;i<drops.length;i++){
    var text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*font_size,drops[i]*font_size);
    if(drops[i]*font_size>c.height&&Math.random()>0.975) drops[i]=0;
    drops[i]++;
}}
setInterval(draw,33);

/* SEND MESSAGE */
function send(){
    var name=document.getElementById("name").value
    var msg=document.getElementById("msg").value
    if(name==""){ alert("اكتب اسمك أولا"); return; }
    if(msg==""){ alert("اكتب الرسالة"); return; }
    var token="PUT_TOKEN"
    var chat="PUT_CHAT_ID"
    var text="📩 رسالة جديدة من الموقع\n\n👤 الاسم: "+name+"\n\n💬 الرسالة:\n"+msg
    fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat+"&text="+encodeURIComponent(text))
    document.getElementById("ok").innerHTML="✅ تم إرسال رسالتك"
    document.getElementById("msg").value=""
}
</script>

</body>
</html>
