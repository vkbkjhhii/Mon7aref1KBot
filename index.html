<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>DARK TERMINAL</title>

<style>

body{
margin:0;
background:#000;
font-family:monospace;
color:#00ff9f;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.9);
border:2px solid #00ff9f;
box-shadow:0 0 40px #00ff9f;
padding:40px;
width:90%;
max-width:420px;
text-align:center;
}

h1{
color:#00ff9f;
font-size:26px;
text-shadow:0 0 15px #00ff9f;
animation:glitch 1s infinite;
}

.skull{
font-size:60px;
margin-bottom:10px;
animation:shake 1s infinite;
}

input,textarea{

width:100%;
padding:12px;
margin:10px 0;
background:black;
border:1px solid #00ff9f;
color:#00ff9f;
font-size:15px;

}

button{

width:100%;
padding:12px;
background:#00ff9f;
border:none;
color:black;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:black;
color:#00ff9f;
border:1px solid #00ff9f;
box-shadow:0 0 20px #00ff9f;

}

.terminal{
text-align:left;
font-size:12px;
margin-bottom:15px;
height:80px;
overflow:hidden;
color:#00ff9f;
}

@keyframes glitch{

0%{text-shadow:2px 2px red;}
25%{text-shadow:-2px -2px blue;}
50%{text-shadow:2px -2px lime;}
75%{text-shadow:-2px 2px red;}
100%{text-shadow:2px 2px blue;}

}

@keyframes shake{

0%{transform:rotate(0)}
25%{transform:rotate(3deg)}
50%{transform:rotate(-3deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="skull">☠</div>

<h1>DARK TERMINAL</h1>

<div class="terminal">
> connecting to dark server...<br>
> bypassing firewall...<br>
> access granted...<br>
</div>

<input id="name" placeholder="اكتب اسمك">

<textarea id="msg" rows="4" placeholder="اكتب رسالتك للمطور"></textarea>

<button onclick="send()">ارسال الرسالة</button>

</div>

<script>

function send(){

let name = document.getElementById("name").value
let msg = document.getElementById("msg").value

let token = "8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY"
let chat_id = "7771042305"

let text = "📩 رسالة جديدة من الموقع\n\n👤 الاسم: "+name+"\n💬 الرسالة: "+msg

fetch("https://api.telegram.org/bot"+token+"/sendMessage",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chat_id,
text:text
})
})

alert("تم ارسال الرسالة")

}

var canvas = document.getElementById("matrix");
var ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

var letters = "01HACKER010101";
letters = letters.split("");

var fontSize = 14;
var columns = canvas.width/fontSize;

var drops = [];
for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
