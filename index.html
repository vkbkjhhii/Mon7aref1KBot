<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DARK HACKER TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>

html, body {
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family: monospace;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:rgba(0,0,0,0.95);
border:2px solid #00ff00;
box-shadow:0 0 40px #00ff00;
padding:40px;
width:400px;
max-width:400px;
text-align:center;
position:relative;
user-select:none;
}

.skull{
font-size:70px;
position:relative;
margin-bottom:20px;
}

.eye-left, .eye-right{
position:absolute;
top:20px;
font-size:20px;
color:red;
animation:fire 0.5s infinite alternate;
}

.eye-left{ left:35px; }
.eye-right{ right:35px; }

@keyframes fire{
0%{color:orange;}
50%{color:red;}
100%{color:yellow;}
}

h1{
font-size:28px;
color:#00ff00;
height:40px;
min-height:40px;
}

.info{
margin-bottom:20px;
color:#00ff00;
font-size:14px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
background:black;
border:1px solid #00ff00;
color:#00ff00;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#00ff00;
border:none;
color:black;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:black;
color:#00ff00;
border:1px solid #00ff00;
box-shadow:0 0 20px #00ff00;
}

</style>
</head>
<body>

<!-- اصوات -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<audio id="typing-sound">
<source src="https://www.soundjay.com/typing/typing-1.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="skull">☠
<span class="eye-left">🔥</span>
<span class="eye-right">🔥</span>
</div>

<h1 id="title"></h1>

<div class="info">You can contact the programmer Mohamed Fraon</div>

<input id="name" placeholder="Enter your name">
<textarea id="msg" rows="4" placeholder="Enter your message"></textarea>

<button onclick="send()">Send Message</button>

</div>

<script>

// كلمة "Almonharef" تظهر وتتمسح وتتكتب حرف حرف
let word = "Almonharef";
let title = document.getElementById("title");
let typingAudio = document.getElementById("typing-sound");

function typeAndErase(){
  let i=0;
  let forward = true;
  function step(){
    typingAudio.currentTime=0;
    typingAudio.play();
    if(forward){
      title.innerHTML = word.slice(0,i+1);
      i++;
      if(i>=word.length){ forward=false; setTimeout(step,700); return;}
    } else {
      title.innerHTML = word.slice(0,i-1);
      i--;
      if(i<=0){ forward=true; setTimeout(step,700); return;}
    }
    setTimeout(step,200);
  }
  step();
}
typeAndErase();

// ارسال الرسالة
function send(){
  let name=document.getElementById("name").value.trim();
  let msg=document.getElementById("msg").value.trim();

  if(name=="" || msg==""){
    alert("You must write your name and message!");
    return;
  }

  let token="8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY";
  let chat_id="7771042305";

  let text = "📩 New message\n\n👤 Name: "+name+"\n💬 Message: "+msg;

  fetch("https://api.telegram.org/bot"+token+"/sendMessage",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:chat_id,text:text})
  });

  alert("Message sent successfully!");
}

</script>

</body>
</html>
