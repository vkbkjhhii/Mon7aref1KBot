<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Contact Developer</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:monospace;
color:#00ff9f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* خلفية Matrix */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* الصندوق */

.box{

width:400px;

background:rgba(0,0,0,0.95);

border:2px solid #00ff9f;

border-radius:15px;

padding:30px;

text-align:center;

box-shadow:0 0 40px #00ff9f;

}

/* الجمجمة */

.skull img{

width:120px;

margin-bottom:10px;

filter:drop-shadow(0 0 10px red);

}

/* العنوان */

h2{

margin-bottom:20px;

text-shadow:0 0 10px #00ff9f;

}

/* الحقول */

input,textarea{

width:90%;

padding:12px;

margin:10px;

border-radius:10px;

border:none;

background:#111;

color:#00ff9f;

font-size:15px;

outline:none;

box-shadow:0 0 5px #00ff9f;

}

textarea{

height:100px;

}

/* الزر */

button{

width:95%;

padding:12px;

border:none;

border-radius:10px;

background:#00ff9f;

color:black;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 20px #00ff9f;

}

button:hover{

background:#0f0;

}

#ok{

margin-top:10px;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="skull">

<img src="https://i.imgur.com/7QZ6F9D.png">

</div>

<h2>تواصل مع المطور</h2>

<input id="name" placeholder="اكتب اسمك">

<textarea id="msg" placeholder="اكتب رسالتك"></textarea>

<button onclick="send()">إرسال الرسالة</button>

<p id="ok"></p>

</div>

<script>

/* Matrix Effect */

var c=document.getElementById("matrix");

var ctx=c.getContext("2d");

c.height=window.innerHeight;

c.width=window.innerWidth;

var letters="01";

letters=letters.split("");

var font_size=14;

var columns=c.width/font_size;

var drops=[];

for(var x=0;x<columns;x++)

drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";

ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0f0";

ctx.font=font_size+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*font_size,drops[i]*font_size);

if(drops[i]*font_size>c.height && Math.random()>0.975)

drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

/* ارسال الرسالة للبوت */

function send(){

var name=document.getElementById("name").value;

var msg=document.getElementById("msg").value;

if(name==""){

alert("اكتب اسمك");

return;

}

if(msg==""){

alert("اكتب الرسالة");

return;

}

var token="8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY";

var chat="7771042305";

var text="📩 رسالة جديدة من الموقع\n\n👤 الاسم: "+name+"\n\n💬 الرسالة:\n"+msg;

fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat+"&text="+encodeURIComponent(text));

document.getElementById("ok").innerHTML="تم إرسال الرسالة بنجاح";

document.getElementById("msg").value="";

}

</script>

</body>
</html>
