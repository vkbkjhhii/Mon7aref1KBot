<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>التواصل مع المطور</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;

}

canvas{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;

}

.container{

width:360px;
background:rgba(0,0,0,0.85);
border:2px solid red;
border-radius:15px;
padding:25px;
text-align:center;
box-shadow:0 0 25px red;

}

/* صورة الهكر */

.avatar{

width:90px;
height:90px;
border-radius:50%;
border:4px solid red;
box-shadow:0 0 20px red;
margin-bottom:10px;

}

/* العنوان */

h1{

margin-bottom:20px;
height:35px;

}

/* خانة الاسم */

.nameInput{

width:100%;
margin:10px 0;
padding:12px;
border-radius:8px;
border:2px solid;
border-image:linear-gradient(90deg,#00ffcc,#00ff00)1;
background:rgba(255,255,255,0.08);
color:white;

}

/* خانة الرسالة */

.msgInput{

width:100%;
margin:10px 0;
padding:12px;
border-radius:8px;
border:2px solid;
border-image:linear-gradient(90deg,#ff0000,#ff6600)1;
background:rgba(255,255,255,0.08);
color:white;
height:100px;
resize:none;

}

/* زر الإرسال */

button{

width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00ff00;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

/* شريط التحميل */

.loader{

width:100%;
height:6px;
background:#222;
border-radius:5px;
margin-top:10px;
display:none;

}

.progress{

height:100%;
width:0%;
background:#00ff00;
border-radius:5px;

}

/* رسالة النجاح */

.success{

margin-top:10px;
color:#00ff00;
display:none;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<!-- صورة هكر -->

<img class="avatar"
src="https://i.postimg.cc/qM9fFCfd/IMG-20260202-193604.png">

<h1 id="title"></h1>

<input id="name"
class="nameInput"
type="text"
placeholder="اكتب اسمك">

<textarea id="message"
class="msgInput"
placeholder="اكتب رسالتك هنا..."></textarea>

<button onclick="sendMessage()">
إرسال الرسالة
</button>

<div class="loader">
<div class="progress" id="progress"></div>
</div>

<div class="success" id="successMsg">
تم إرسال رسالتك إلى المطور
</div>

</div>

<script>

/* بيانات البوت */

const BOT_TOKEN="8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY";

const CHAT_ID="7771042305";

/* إرسال الرسالة */

function sendMessage(){

let name=document.getElementById("name").value.trim();
let message=document.getElementById("message").value.trim();

if(name==""||message==""){

alert("يجب كتابة الاسم والرسالة");

return;

}

/* إظهار التحميل */

document.querySelector(".loader").style.display="block";

let progress=document.getElementById("progress");

let width=0;

let interval=setInterval(function(){

if(width>=100){

clearInterval(interval);

sendToTelegram(name,message);

}

else{

width+=5;

progress.style.width=width+"%";

}

},50);

}

function sendToTelegram(name,message){

let text=
"📩 رسالة جديدة من الموقع\n\n"+
"👤 الاسم: "+name+"\n\n"+
"💬 الرسالة:\n"+message;

let url="https://api.telegram.org/bot"
+BOT_TOKEN+
"/sendMessage?chat_id="
+CHAT_ID+
"&text="
+encodeURIComponent(text);

fetch(url)

.then(res=>{

document.getElementById("successMsg").style.display="block";

document.getElementById("name").value="";
document.getElementById("message").value="";

});

}

/* كتابة العنوان */

const text="التواصل مع المطور";

let index=0;
let deleting=false;

const title=document.getElementById("title");

function typeEffect(){

if(!deleting){

title.innerHTML=text.substring(0,index+1);

index++;

if(index==text.length){

deleting=true;

setTimeout(typeEffect,1500);

return;

}

}

else{

title.innerHTML=text.substring(0,index-1);

index--;

if(index==0){

deleting=false;

}

}

setTimeout(typeEffect,120);

}

typeEffect();

/* خلفية Matrix */

const canvas=document.getElementById("matrix");

const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;

canvas.width=window.innerWidth;

const letters="python bot telegram import class while True False";

const matrix=letters.split("");

const fontSize=14;

const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
