<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hacker Face Contact</title>

<style>
body{
  margin:0; padding:0;
  background:black; color:#00ff9f;
  font-family:monospace;
  display:flex; justify-content:center; align-items:center;
  height:100vh; overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas#matrix{
  position:fixed; top:0; left:0; z-index:-1;
}

/* الصندوق */
.box{
  width:400px; padding:30px;
  background:rgba(0,0,0,0.95);
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 40px #00ff9f,0 0 20px #0f0 inset;
  border:2px solid #0f0;
  position:relative;
}

/* وجه الهاكر */
.skull{
  position:relative;
  width:140px; height:140px;
  margin:0 auto 20px;
}
.skull img{
  width:140px; height:140px;
  border-radius:15px;
  box-shadow:0 0 20px #0f0;
  display:block;
}

/* عيون نار */
.skull .eye{
  width:25px; height:25px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:50px;
  animation: fire 0.3s infinite alternate;
}
.skull .eye.left{ left:35px; }
.skull .eye.right{ right:35px; }

@keyframes fire{
  0%{ box-shadow:0 0 15px orange,0 0 35px red; transform:translateY(0);}
  100%{ box-shadow:0 0 35px orange,0 0 60px red; transform:translateY(-3px);}
}

/* INPUTS */
input,textarea{
  width:90%; padding:12px; margin:10px 0;
  border:none; border-radius:10px;
  background:#111; color:#00ff9f;
  outline:none; font-family:monospace;
  box-shadow:0 0 5px #0f0;
}
textarea{ height:100px; }

/* BUTTON */
button{
  width:95%; padding:12px; border:none; border-radius:10px;
  background:#00ff9f; font-weight:bold; cursor:pointer;
  box-shadow:0 0 15px #0f0;
}
button:hover{ background:#0f0; }

#ok{ margin-top:10px; color:#00ff9f; font-weight:bold; }

h3{ margin-bottom:20px; text-shadow:0 0 10px #0f0; }

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="skull">
  <img src="hacker_face.png" alt="Hacker Face">
  <div class="eye left"></div>
  <div class="eye right"></div>
</div>

<h3>تواصل مع المطور</h3>

<input id="name" placeholder="اكتب اسمك">
<textarea id="msg" placeholder="اكتب رسالتك"></textarea>
<button onclick="send()">إرسال</button>
<p id="ok"></p>

</div>

<script>
/* MATRIX BACKGROUND */
var c=document.getElementById("matrix");
var ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;
var letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
letters=letters.split("");
var font_size=16;
var columns=c.width/font_size;
var drops=[];
for(var x=0;x<columns;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0f0";
ctx.font=font_size+"px monospace";
for(var i=0;i<drops.length;i++){
    var text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*font_size,drops[i]*font_size);
    if(drops[i]*font_size>c.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
}}
setInterval(draw,33);

/* SEND MESSAGE */
function send(){
  var name=document.getElementById("name").value
  var msg=document.getElementById("msg").value
  if(name==""){ alert("اكتب اسمك أولا"); return;}
  if(msg==""){ alert("اكتب الرسالة"); return;}
  var token="8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY"       // ضع هنا توكن البوت
  var chat="7771042305"      // ضع هنا Chat ID الخاص بك
  var text="تم استلام رساله جديده من موقع البوت 📩\n\n👤 الاسم: "+name+"\n\n💬 الرسالة:\n"+msg
  fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat+"&text="+encodeURIComponent(text))
  document.getElementById("ok").innerHTML="✅ تم إرسال رسالتك"
  document.getElementById("msg").value=""
}
</script>

</body>
</html>
