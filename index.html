<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>التواصل مع المطور</title>
<style>
/* صفحة ثابتة الحجم */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* يمنع التكبير أو التصغير */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: black;
}

/* خلفية ماتريكس متحركة */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* صندوق المحتوى */
.box {
    position: relative;
    z-index: 1;
    background: rgba(0,0,0,0.9);
    padding: 40px 30px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 30px #0F0;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
}

/* اسم البوت */
h1 {
    margin-bottom: 25px;
    font-size: 28px;
    color: #0F0;
    text-shadow: 0 0 15px #0F0;
}

/* الحقول */
input, textarea {
    width: 90%;
    padding: 15px;
    margin: 12px 0;
    border-radius: 12px;
    border: 1px solid #0F0;
    background: #000;
    color: #0F0;
    font-size: 16px;
    outline: none;
    resize: none;
}

/* زر الإرسال */
button {
    background: #0F0;
    color: #000;
    padding: 15px;
    border: none;
    border-radius: 12px;
    width: 60%;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #00CC00;
}

#ok {
    margin-top: 15px;
    font-weight: bold;
    font-size: 16px;
    color: #FF5555;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="box">
    <h1>اسم البوت هنا</h1>
    <input id="name" placeholder="اسمك" type="text">
    <textarea id="msg" placeholder="اكتب رسالتك" rows="5"></textarea>
    <br>
    <button onclick="send()">إرسال</button>
    <p id="ok"></p>
</div>

<script>
// ----- خلفية ماتريكس احترافية -----
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポ0123456789";
const fontSize = 18;
const columns = canvas.width / fontSize;

const drops = [];
for(let x=0; x<columns; x++) drops[x] = Math.random() * canvas.height;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for(let i=0; i<drops.length; i++){
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(draw, 50);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// ----- إرسال الرسالة -----
function send() {
    var name = document.getElementById("name").value.trim();
    var msg = document.getElementById("msg").value.trim();

    if(!name){
        document.getElementById("ok").innerHTML = "🛑 لا يمكنك إرسال رسالة بدون كتابة الاسم!";
        return;
    }

    if(!msg){
        document.getElementById("ok").innerHTML = "🛑 الرجاء كتابة الرسالة!";
        return;
    }

    var token = "8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY"; // ضع توكن البوت هنا
    var chat = "7771042305";     // ضع شات المطور هنا

    var text = "رسالة جديدة 📩\n\nالاسم: " + name + "\n\nالرسالة:\n" + msg;

    fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat+"&text="+encodeURIComponent(text))
    .then(response => response.json())
    .then(data => {
        if(data.ok){
            document.getElementById("ok").style.color = "#0F0";
            document.getElementById("ok").innerHTML = "✅ تم إرسال الرسالة بنجاح";
            document.getElementById("name").value = "";
            document.getElementById("msg").value = "";
        } else {
            document.getElementById("ok").style.color = "#FF5555";
            document.getElementById("ok").innerHTML = "❌ فشل الإرسال، حاول مرة أخرى";
        }
    })
    .catch(err => {
        document.getElementById("ok").style.color = "#FF5555";
        document.getElementById("ok").innerHTML = "⚠️ حدث خطأ، تأكد من الاتصال بالإنترنت";
    });
}
</script>
</body>
</html>
