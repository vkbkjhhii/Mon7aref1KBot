<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Contact Developer</title>

<style>

body{
margin:0;
background:black;
color:#00ff9f;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* خلفية ماتريكس */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* الصندوق */

.box{
width:350px;
background:rgba(0,0,0,0.8);
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #00ff9f;
}

/* الجمجمة */

.skull{
font-size:50px;
margin-bottom:10px;
}

/* الحقول */

input, textarea{

width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#111;
color:white;
outline:none;

}

/* الزر */

button{

width:95%;
padding:12px;
background:#00ff9f;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#00cc7a;
}

/* رسالة النجاح */

#ok{
margin-top:10px;
color:#00ff9f;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="skull">💀</div>

<h3>تواصل مع المطور</h3>

<input id="name" placeholder="اكتب اسمك">

<textarea id="msg" placeholder="اكتب رسالتك"></textarea>

<button onclick="send()">إرسال الرسالة</button>

<p id="ok"></p>

</div>

<script>

/* ماتريكس */

var c = document.getElementById("matrix");
var ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

var letters = "01";
letters = letters.split("");

var font_size = 14;
var columns = c.width/font_size;

var drops = [];

for(var x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
ctx.fillRect(0, 0, c.width, c.height);

ctx.fillStyle = "#0F0";
ctx.font = font_size + "px arial";

for(var i = 0; i < drops.length; i++){

var text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text, i*font_size, drops[i]*font_size);

if(drops[i]*font_size > c.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw, 33);

/* ارسال الرسالة */

function send(){

var name=document.getElementById("name").value
var msg=document.getElementById("msg").value

if(name==""){
alert("لا يمكنك إرسال رسالة بدون كتابة اسمك")
return
}

var token="8768225608:AAHkYYcW-3wIUykW9UIGMh1qug8XtxIPuwY"
var chat="7771042305"

var text="📩 رسالة جديدة من الموقع\n\n👤 الاسم: "+name+"\n\n💬 الرسالة:\n"+msg

fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat+"&text="+encodeURIComponent(text))

document.getElementById("ok").innerHTML="✅ تم إرسال رسالتك إلى المطور"

}

</script>

</body>
</html>
